---
layout: compress
---

<!doctype html>

{% include origin-type.html %}

{% include lang.html %}

{% if site.theme_mode %}
  {% capture prefer_mode %}data-mode="{{ site.theme_mode }}"{% endcapture %}
{% endif %}

<html lang="{{ page.lang | default: site.alt_lang | default: site.lang }}" {{ prefer_mode }}>
  {% include head.html lang=lang %}

  <body class="secret-room-shell {{ page.body_class }}">
    <main aria-label="Main Content" class="secret-room-main">
      {{ content }}
    </main>
  </body>
</html>
